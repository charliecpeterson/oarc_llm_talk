<svg viewBox="0 0 1200 348" width="1200" height="348" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="ah" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="9" refY="4.5" orient="auto"><path d="M0,0 L11,4.5 L0,9 Z" fill="#666666"/></marker>
    <marker id="ahg" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="13" refX="9" refY="4.5" orient="auto"><path d="M0,0 L11,4.5 L0,9 Z" fill="#21A364"/></marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/></filter>
  </defs>

  <!-- LANE A: model alone -->
  <text x="36" y="36" font-size="20" font-weight="700" fill="#C44D63">A &#183; Ask the model alone &#8212; &#8220;what is 3847 &#215; 2916?&#8221;</text>
  <g filter="url(#sh)">
    <rect x="140" y="62" width="124" height="50" rx="10" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
    <rect x="380" y="62" width="124" height="50" rx="10" fill="#1C6D72"/>
    <rect x="620" y="62" width="170" height="50" rx="10" fill="#fdf0f3" stroke="#C44D63" stroke-width="1.5"/>
  </g>
  <text x="202" y="93" font-size="17" text-anchor="middle" fill="#2a2a2a">You</text>
  <text x="442" y="93" font-size="17" text-anchor="middle" fill="#ffffff" font-weight="600">LLM</text>
  <text x="705" y="93" font-size="17" text-anchor="middle" fill="#C44D63" font-weight="700">11,218,452&#8201;?</text>
  <line x1="268" y1="87" x2="372" y2="87" stroke="#666666" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="508" y1="87" x2="612" y2="87" stroke="#666666" stroke-width="2.5" marker-end="url(#ah)"/>
  <text x="840" y="76" font-size="14" fill="#666666">It did the math &#8220;in its head&#8221;: predicted what an</text>
  <text x="840" y="96" font-size="14" fill="#666666">answer looks like, never computed one.</text>
  <text x="840" y="116" font-size="14" fill="#C44D63" font-weight="600">Plausible every time; correct only sometimes.</text>

  <line x1="36" y1="152" x2="1164" y2="152" stroke="#000000" stroke-opacity="0.06" stroke-width="1"/>

  <!-- LANE B: calculator tool attached -->
  <text x="36" y="196" font-size="20" font-weight="700" fill="#1C6D72">B &#183; Same question, calculator tool attached</text>
  <g filter="url(#sh)">
    <rect x="48" y="230" width="100" height="54" rx="10" fill="#ffffff" stroke="#999999" stroke-width="1.5"/>
    <rect x="200" y="230" width="100" height="54" rx="10" fill="#1C6D72"/>
    <rect x="352" y="230" width="240" height="54" rx="10" fill="#ffffff" stroke="#1C6D72" stroke-width="2"/>
    <rect x="664" y="230" width="100" height="54" rx="10" fill="#1C6D72"/>
    <rect x="816" y="230" width="180" height="54" rx="10" fill="#e7f5ee" stroke="#21A364" stroke-width="1.5"/>
  </g>
  <text x="98" y="263" font-size="16" text-anchor="middle" fill="#2a2a2a">You</text>
  <text x="250" y="263" font-size="16" text-anchor="middle" fill="#ffffff" font-weight="600">LLM</text>
  <text x="472" y="252" font-size="15" text-anchor="middle" fill="#1C6D72" font-weight="700">Calculator</text>
  <text x="472" y="273" font-size="13.5" text-anchor="middle" fill="#666666" font-family="Menlo, Consolas, monospace">3847 * 2916</text>
  <text x="714" y="263" font-size="16" text-anchor="middle" fill="#ffffff" font-weight="600">LLM</text>
  <text x="906" y="263" font-size="16" text-anchor="middle" fill="#177a4b" font-weight="700">11,218,452&#8201;&#10003;</text>
  <line x1="152" y1="257" x2="194" y2="257" stroke="#666666" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="304" y1="257" x2="346" y2="257" stroke="#666666" stroke-width="2.5" marker-end="url(#ah)"/>
  <line x1="596" y1="257" x2="658" y2="257" stroke="#21A364" stroke-width="2.5" marker-end="url(#ahg)"/>
  <line x1="768" y1="257" x2="810" y2="257" stroke="#666666" stroke-width="2.5" marker-end="url(#ah)"/>
  <text x="325" y="222" font-size="13" text-anchor="middle" fill="#666666">calls</text>
  <text x="627" y="222" font-size="13" text-anchor="middle" fill="#21A364">11218452</text>
  <text x="600" y="322" font-size="14.5" text-anchor="middle" fill="#177a4b" font-weight="600">The LLM never touched the numbers: it wrote the call and read the result back.</text>
</svg>
